<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Gemma4 Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;height:100dvh;display:flex;flex-direction:column}
#setup{display:flex;flex-direction:column;gap:12px;padding:20px;max-width:400px;margin:auto;width:100%}
#setup h1{font-size:20px;text-align:center;color:#f0f6fc}
#setup input,#setup button{padding:12px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#c9d1d9;font-size:16px}
#setup button{background:#238636;border:none;color:#fff;font-weight:600;cursor:pointer}
#setup button:hover{background:#2ea043}
#setup .hint{font-size:12px;color:#8b949e;text-align:center}
#chat{display:none;flex-direction:column;height:100dvh}
#header{background:#161b22;padding:12px 16px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center}
#header h2{font-size:16px;color:#f0f6fc}
#header button{background:none;border:1px solid #30363d;color:#8b949e;padding:6px 12px;border-radius:6px;font-size:14px;cursor:pointer}
#messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:15px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.msg.user{align-self:flex-end;background:#238636;color:#fff}
.msg.assistant{align-self:flex-start;background:#161b22;border:1px solid #30363d}
.msg .thinking{font-size:12px;color:#8b949e;font-style:italic;margin-bottom:6px;border-left:2px solid #30363d;padding-left:8px}
#input-area{display:flex;gap:8px;padding:12px;border-top:1px solid #30363d;background:#161b22}
#input-area input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:16px;outline:none}
#input-area button{padding:10px 16px;border-radius:20px;background:#238636;border:none;color:#fff;font-weight:600;cursor:pointer;font-size:15px}
.loading{color:#8b949e;font-size:14px;padding:8px}
#error{color:#f85149;text-align:center;font-size:13px;padding:8px}
</style>
</head>
<body>

<div id="setup">
  <h1>Gemma4 Uncensored</h1>
  <input id="ep" type="text" placeholder="Endpoint URL (from HF console)">
  <input id="tk" type="password" placeholder="HF Token">
  <button onclick="connect()">Connect</button>
  <div class="hint">Token stays on your device only</div>
</div>

<div id="chat">
  <div id="header">
    <h2>Gemma4 26B</h2>
    <button onclick="disconnect()">Disconnect</button>
  </div>
  <div id="messages"></div>
  <div id="error"></div>
  <div id="input-area">
    <input id="prompt" type="text" placeholder="Message..." onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const setup = document.getElementById('setup');
const chat = document.getElementById('chat');
const messages = document.getElementById('messages');
const error = document.getElementById('error');
const prompt = document.getElementById('prompt');

document.getElementById('ep').value = localStorage.getItem('ep') || '';
document.getElementById('tk').value = localStorage.getItem('tk') || '';
if (localStorage.getItem('ep') && localStorage.getItem('tk')) showChat();

function connect() {
  const ep = document.getElementById('ep').value.trim();
  const tk = document.getElementById('tk').value.trim();
  if (!ep || !tk) return;
  localStorage.setItem('ep', ep);
  localStorage.setItem('tk', tk);
  showChat();
}

function showChat() { setup.style.display='none'; chat.style.display='flex'; }
function disconnect() { localStorage.clear(); setup.style.display='flex'; chat.style.display='none'; messages.innerHTML=''; }

async function send() {
  const text = prompt.value.trim();
  if (!text) return;
  prompt.value = '';
  error.textContent = '';
  addMessage(text, 'user');
  
  const loading = document.createElement('div');
  loading.className = 'msg assistant loading';
  loading.textContent = 'Thinking...';
  messages.appendChild(loading);
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch(localStorage.getItem('ep') + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+localStorage.getItem('tk') },
      body: JSON.stringify({ model:'tgi', messages:[{role:'user',content:text}], max_tokens:4096, stream:false })
    });
    const data = await res.json();
    loading.remove();
    
    if (data.error) { error.textContent = data.error.message || data.error; return; }
    
    const msg = data.choices?.[0]?.message;
    const thinking = msg?.reasoning_content;
    const content = msg?.content || '(empty)';
    
    const div = document.createElement('div');
    div.className = 'msg assistant';
    if (thinking) { 
      const t = document.createElement('div'); t.className='thinking'; t.textContent=thinking; div.appendChild(t); 
    }
    div.appendChild(document.createTextNode(content));
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  } catch(e) {
    loading.remove();
    error.textContent = 'Connection failed: ' + e.message;
  }
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}
</script>
</body>
</html>
